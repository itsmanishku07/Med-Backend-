name: Deploy Docker App

on:
  push:
    branches:
      - logger_w

jobs:
  med-backend:
    runs-on: self-hosted

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Stop Old Container
        run: |
          docker stop med-backend-container || true
          docker rm med-backend-container || true

      - name: Remove Old Image
        run: |
          docker rmi med-backend-image || true

      - name: Build Docker Image
        run: |
          docker build -t med-backend-image .

      - name: Run Docker Container
        run: |
          docker run -d \
            --name med-backend-container \
            -p 8081:8081 \
            med-backend-image
