name: Python application

on:
  push:
    branches: [ "logger_w" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v3
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Stop existing & start in background
        run: |
          pkill -f app.py || true
          sleep 2
          setsid nohup python3 app.py > app.log 2>&1 &
          echo $! > /tmp/app.pid
          echo "App started with PID $(cat /tmp/app.pid)"
