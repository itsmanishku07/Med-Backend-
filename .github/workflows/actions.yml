name: Deploy Python App

on:
  push:
    branches: [ "logger_w" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Kill old app (if running)
      run: |
        pkill -f app.py || true

    - name: Start app
      run: |
        nohup python3 app.py > app.log 2>&1 &
